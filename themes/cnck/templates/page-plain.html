{% extends "base.html" %}

{# A standalone page with no date/reading-time metadata (e.g. About). #}
{% block content %}
<article class="post">
  <header class="page-header">
    <h1 class="page-header__title">{{ page.title }}</h1>
    {%- if page.description %}<p class="page-header__desc">{{ page.description }}</p>{% endif %}
  </header>
  <div class="prose">
    {{ page.content | safe }}
  </div>
</article>
{% endblock content %}
